<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>👑 Súper Admin - Servicios del Pollito</title>
    <style>
        :root { --bg: #202225; --panel: #2f3136; --accent: #5865f2; --danger: #ed4245; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .card { background: var(--panel); padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #4f545c; }
        button { border: none; border-radius: 4px; padding: 10px 15px; cursor: pointer; font-weight: bold; color: white; margin-right: 5px; }
        input { background: #40444b; border: none; padding: 12px; color: white; border-radius: 5px; width: 70%; }
        .status-on { color: #2ecc71; } .status-off { color: var(--danger); }
    </style>
</head>
<body>

    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>👑 Panel de Poder</h1>
        <a href="app.html" style="color:gray; text-decoration:none;">← Volver al Chat</a>
    </div>

    <div class="card" style="border-color: var(--danger);">
        <h3>🚨 ESTADO GLOBAL DE LA WEB</h3>
        <button style="background:#2ecc71" onclick="cambiarEstado(true)">✅ ABRIR WEB</button>
        <button style="background:var(--danger)" onclick="cambiarEstado(false)">⛔ CERRAR (MANTENIMIENTO)</button>
        <button style="background:#e67e22" onclick="reiniciarChat()">🔥 BORRAR TODO EL CHAT</button>
        <p>Estado actual: <span id="web-status">Cargando...</span></p>
    </div>

    <div class="card" style="border-color: var(--accent);">
        <h3>📣 ANUNCIO OFICIAL DEL SISTEMA</h3>
        <div style="display:flex; gap:10px;">
            <input id="sys-msg" placeholder="Escribe el mensaje del sistema...">
            <button style="background:var(--accent)" onclick="enviarAnuncio()">PUBLICAR</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCVQyiAqSFu00dxVxBv3UVv6qbPx_pPlC4",
            authDomain: "serviciosdelpollito-d7c13.firebaseapp.com",
            projectId: "serviciosdelpollito-d7c13"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Escuchar estado real de la web
        db.collection("configuracion").doc("estado").onSnapshot(doc => {
            const status = doc.exists && doc.data().abierto ? "🟢 ABIERTA" : "🔴 EN MANTENIMIENTO";
            document.getElementById("web-status").innerText = status;
        });

        function cambiarEstado(valor) {
            db.collection("configuracion").doc("estado").set({ abierto: valor })
            .then(() => alert("Estado actualizado"));
        }

        async function reiniciarChat() {
            if(confirm("¿Seguro? Se borrarán todos los mensajes.")){
                const snap = await db.collection("messages").get();
                const batch = db.batch();
                snap.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                alert("Nido limpio 🐣");
            }
        }

        function enviarAnuncio() {
            const txt = document.getElementById("sys-msg").value;
            if(!txt) return;
            db.collection("messages").add({
                nombre: "SISTEMA 🤖",
                texto: "⚠️ " + txt,
                foto: "https://i.imgur.com/GypIgex.png",
                fecha: Date.now(),
                sistema: true
            }).then(() => { document.getElementById("sys-msg").value = ""; });
        }
    </script>
</body>
</html>
